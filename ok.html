<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>3D Cellular Automata</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: white;
  }

  canvas {
    display: block;
  }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js";





// =====================================================
// SETTINGS
// =====================================================

const N = 8;
const SPACING = 1;
const CUBE_SIZE = 0.7;





// =====================================================
// WORLD
// =====================================================

let world = [];

for (let x = 0; x < N; x++) {

  world[x] = [];

  for (let y = 0; y < N; y++) {

    world[x][y] = [];

    for (let z = 0; z < N; z++) {

      world[x][y][z] =
        Math.random() > 0.83 ? 1 : 0;
    }
  }
}





// =====================================================
// CELLULAR AUTOMATA STEP
// =====================================================

function step(w) {

  let next = [];

  for (let x = 0; x < N; x++) {

    next[x] = [];

    for (let y = 0; y < N; y++) {

      next[x][y] = [];

      for (let z = 0; z < N; z++) {

        let c = 0;

        for (let i = -1; i <= 1; i++) {
          for (let j = -1; j <= 1; j++) {
            for (let k = -1; k <= 1; k++) {

              if (i === 0 && j === 0 && k === 0)
                continue;

              const xi = x + i;
              const yj = y + j;
              const zk = z + k;

              if (
                xi >= 0 && xi < N &&
                yj >= 0 && yj < N &&
                zk >= 0 && zk < N
              ) {
                c += w[xi][yj][zk];
              }
            }
          }
        }

        if (w[x][y][z] === 1) {
          next[x][y][z] =
            (c >= 2 && c <= 5) ? 1 : 0;
        }
        else {
          next[x][y][z] =
            (c >= 3 && c <= 4) ? 1 : 0;
        }
      }
    }
  }

  // random birth
  if (Math.random() < 0.12) {

    const x = Math.floor(Math.random() * N);
    const y = Math.floor(Math.random() * N);
    const z = Math.floor(Math.random() * N);

    next[x][y][z] = 1;
  }

  return next;
}





// =====================================================
// SCENE
// =====================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.set(7, 7, 12);

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

document.body.appendChild(renderer.domElement);





// =====================================================
// CONTROLS
// =====================================================

const controls = new OrbitControls(
  camera,
  renderer.domElement
);

controls.enableDamping = true;





// =====================================================
// SHADER MATERIAL
// =====================================================

const material = new THREE.ShaderMaterial({

  vertexShader: `

    varying vec3 vWorldPos;
    varying vec3 vNormalDir;

    void main() {

      vec4 worldPos =
        modelMatrix * instanceMatrix * vec4(position, 1.0);

      vWorldPos = worldPos.xyz;

      vNormalDir =
        normalize(mat3(modelMatrix * instanceMatrix) * normal);

      gl_Position =
        projectionMatrix *
        viewMatrix *
        worldPos;
    }
  `,

  fragmentShader: `

    varying vec3 vWorldPos;
    varying vec3 vNormalDir;

    void main() {

      vec3 baseColor = vec3(0.0, 1.0, 0.35);

      vec3 lightDir =
        normalize(vec3(0.6, 0.9, 1.0));

      float diff =
        max(dot(vNormalDir, lightDir), 0.0);

      diff = smoothstep(0.25, 0.9, diff);

      vec3 viewDir =
        normalize(cameraPosition - vWorldPos);

      vec3 halfDir =
        normalize(lightDir + viewDir);

      float spec =
        pow(
          max(dot(vNormalDir, halfDir), 0.0),
          60.0
        );

      float rim =
        pow(
          1.0 - max(dot(vNormalDir, viewDir), 0.0),
          5.0
        );

      vec3 color =
        baseColor * diff * 0.9;

      color += vec3(1.0) * spec * 0.9;

      color += baseColor * rim * 0.25;

      gl_FragColor = vec4(color, 1.0);
    }
  `
});





// =====================================================
// INSTANCED MESH
// =====================================================

const geometry = new THREE.BoxGeometry(
  CUBE_SIZE * 2,
  CUBE_SIZE * 2,
  CUBE_SIZE * 2
);

const maxCount = N * N * N;

const cubes = new THREE.InstancedMesh(
  geometry,
  material,
  maxCount
);

scene.add(cubes);

const dummy = new THREE.Object3D();





// =====================================================
// UPDATE CUBES
// =====================================================

function updateMesh() {

  let index = 0;

  for (let x = 0; x < N; x++) {
    for (let y = 0; y < N; y++) {
      for (let z = 0; z < N; z++) {

        if (world[x][y][z] === 1) {

          dummy.position.set(
            (x - N / 2) * SPACING,
            (y - N / 2) * SPACING,
            (z - N / 2) * SPACING
          );

          dummy.updateMatrix();

          cubes.setMatrixAt(
            index,
            dummy.matrix
          );

          index++;
        }
      }
    }
  }

  cubes.count = index;
  cubes.instanceMatrix.needsUpdate = true;
}

updateMesh();





// =====================================================
// ANIMATION
// =====================================================

let tick = 0;

function animate() {

  requestAnimationFrame(animate);

  tick++;

  if (tick % 18 === 0) {

    world = step(world);

    updateMesh();
  }

  controls.update();

  renderer.render(scene, camera);
}

animate();





// =====================================================
// RESIZE
// =====================================================

window.addEventListener("resize", () => {

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
});

</script>
</body>
</html>
